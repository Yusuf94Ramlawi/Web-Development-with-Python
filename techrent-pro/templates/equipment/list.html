{% extends "base.html" %} {% block title %}Equipment Catalogue{% endblock %} {%
block content %}
<div>
  <h1>Equipment Catalogue</h1>
  <a href="/equipment/add">
    <button
      style="
        margin-bottom: 20px;
        padding: 10px 20px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      "
    >
      + Add Equipment
    </button>
  </a>
</div>

<!-- Category Filter with search-->
<div style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px">
  <select style="padding: 8px; border: 1px solid #ddd; border-radius: 4px">
    <option value="">All Categories</option>
    <option value="laptops">Laptops</option>
    <option value="cameras">Cameras</option>
    <option value="projectors">Projectors</option>
  </select>
  <input
    type="text"
    placeholder="Search equipment..."
    style="
      padding: 8px;
      width: 200px;
      border: 1px solid #ddd;
      border-radius: 4px;
    "
  />
  <button
    style="
      padding: 8px 16px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    "
  >
    Find
  </button>
</div>

<!-- Equipment Table -->
<div>
  <table>
    <thead>
      <tr>
        <th style="border: 1px solid #ddd; padding: 8px">ID</th>
        <th style="border: 1px solid #ddd; padding: 8px">Name</th>
        <th style="border: 1px solid #ddd; padding: 8px">Category</th>
        <th style="border: 1px solid #ddd; padding: 8px">Rate/day</th>
        <th style="border: 1px solid #ddd; padding: 8px">Qty</th>
        <th style="border: 1px solid #ddd; padding: 8px">Available</th>
        <th style="border: 1px solid #ddd; padding: 8px">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td style="border: 1px solid #ddd; padding: 8px">1</td>
        <td style="border: 1px solid #ddd; padding: 8px">Dell XPS 13</td>
        <td style="border: 1px solid #ddd; padding: 8px">Laptop</td>
        <td style="border: 1px solid #ddd; padding: 8px">$50</td>
        <td style="border: 1px solid #ddd; padding: 8px">10</td>
        <td style="border: 1px solid #ddd; padding: 8px">Yes</td>
        <td style="border: 1px solid #ddd; padding: 8px">
          <a href="/equipment/1"><button style="padding: 5px 10px; margin-right: 5px">View</button></a>
          <a href="/equipment/edit/1"><button style="padding: 5px 10px; margin-right: 5px">Edit</button></a>
          <form action="/equipment/delete/1" method="post" style="display: inline;">
            <button
              type="submit"
              style="padding: 5px 10px; background-color: red; color: white"
            >
              Delete
          </button>
        </td>
      </tr>
      <tr>
        <td style="border: 1px solid #ddd; padding: 8px">2</td>
        <td style="border: 1px solid #ddd; padding: 8px">Canon EOS R5</td>
        <td style="border: 1px solid #ddd; padding: 8px">Camera</td>
        <td style="border: 1px solid #ddd; padding: 8px">$70</td>
        <td style="border: 1px solid #ddd; padding: 8px">5</td>
        <td style="border: 1px solid #ddd; padding: 8px">No</td>
        <td style="border: 1px solid #ddd; padding: 8px">
          <a href="/equipment/2"><button style="padding: 5px 10px; margin-right: 5px">View</button></a>
          <a href="/equipment/edit/2"><button style="padding: 5px 10px; margin-right: 5px">Edit</button></a>
          <form action="/equipment/delete/2" method="post" style="display: inline;">
            <button
              type="submit"
              style="padding: 5px 10px; background-color: red; color: white"
            >
              Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

{% endblock %}
