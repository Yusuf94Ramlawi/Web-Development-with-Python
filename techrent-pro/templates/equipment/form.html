{% extends 'base.html' %}
{% block title %}{{ 'Edit Equipment' if mode == 'edit' else 'Add Equipment' }}{% endblock %}
{% block content %}
<h1>{{ 'Edit Equipment' if mode == 'edit' else 'Add New Equipment' }}</h1>
<form class="card p-4" method="post" action="{{ form_action }}">
    <div class="mb-3">
        <label for="name" class="form-label">Name:</label>
        <input type="text" id="name" name="name" class="form-control" required value="{{ form_data.name|default('') }}">
    </div>
    <div class="mb-3">
        <label for="category" class="form-label">Category:</label>
        <select id="category" name="category" class="form-select" required onchange="toggleOtherCategory()">
            <option value="" selected disabled>Select Category</option>
            {% for category in categories %}
            <option value="{{ category }}" {% if form_data.category==category %}selected{% endif %}>{{ category }}
            </option>
            {% endfor %}
            <option value="Other" {% if form_data.category=='Other' %}selected{% endif %}>Other</option>
        </select>
        <input type="text" id="other-category" name="other_category" class="form-control mt-2"
            placeholder="Enter new category" style="display: none;" value="{{ form_data.other_category|default('') }}">
    </div>
    <div class="mb-3">
        <label for="description" class="form-label">Description:</label>
        <textarea id="description" name="description" class="form-control"
            required>{{ form_data.description|default('') }}</textarea>
    </div>
    <div class="mb-3">
        <label for="daily_rate" class="form-label">Daily Rate ($):</label>
        <input type="number" id="daily_rate" name="daily_rate" class="form-control" min="1" step="0.01" required
            value="{{ form_data.daily_rate|default('') }}">
    </div>
    <div class="mb-3">
        <label for="quantity" class="form-label">Quantity:</label>
        <input type="number" id="quantity" name="quantity" class="form-control" min="1" required
            value="{{ form_data.quantity|default('') }}">
    </div>
    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="available" name="available" value="1" {% if
            form_data.available %}checked{% endif %}>
        <label class="form-check-label" for="available">Available</label>
    </div>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">{{ 'Save Changes' if mode == 'edit' else 'Add Equipment'
            }}</button>
        <a href="/equipment" class="btn btn-secondary">Cancel</a>
    </div>
</form>
<script>
    function toggleOtherCategory() {
        var select = document.getElementById('category');
        var other = document.getElementById('other-category');
        if (select.value === 'Other') {
            other.style.display = '';
            other.required = true;
        } else {
            other.style.display = 'none';
            other.required = false;
        }
    }
    document.addEventListener('DOMContentLoaded', function () {
        toggleOtherCategory();
    });
</script>
{% endblock %}
