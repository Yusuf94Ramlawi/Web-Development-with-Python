{% extends "base.html" %} {% block title %}Customers{% endblock %} {%
block content %}
<div>
  <h1>Customers</h1>
  <a href="/customers/add">
    <button
      style="
        margin-bottom: 20px;
        padding: 10px 20px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      "
    >
      + Register Customer
    </button>
  </a>
</div>

<!-- Category Filter with search-->
<div style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px">
  <input
    type="text"
    placeholder="Search"
    style="
      padding: 8px;
      width: 200px;
      border: 1px solid #ddd;
      border-radius: 4px;
    "
  />
  <button
    style="
      padding: 8px 16px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    "
  >
    Search
  </button>
</div>

<!-- customers Table -->
<div>
  <table>
    <thead>
      <tr>
        <th style="border: 1px solid #ddd; padding: 8px">ID</th>
        <th style="border: 1px solid #ddd; padding: 8px">Name</th>
        <th style="border: 1px solid #ddd; padding: 8px">Email</th>
        <th style="border: 1px solid #ddd; padding: 8px">Phone</th>
        <th style="border: 1px solid #ddd; padding: 8px">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td style="border: 1px solid #ddd; padding: 8px">1</td>
        <td style="border: 1px solid #ddd; padding: 8px">John Doe</td>
        <td style="border: 1px solid #ddd; padding: 8px">john.doe@example.com</td>
        <td style="border: 1px solid #ddd; padding: 8px">123-456-7890</td>
        <td style="border: 1px solid #ddd; padding: 8px">
          <a href="/customers/edit/1"><button style="padding: 5px 10px; margin-right: 5px">Edit</button></a>
          <form action="/customers/delete/1" method="post" style="display: inline;">
            <button
              type="submit"
              style="padding: 5px 10px; background-color: red; color: white"
            >
              Delete
          </button>
        </td>
      </tr>
      <tr>
        <td style="border: 1px solid #ddd; padding: 8px">2</td>
        <td style="border: 1px solid #ddd; padding: 8px">Jane Smith</td>
        <td style="border: 1px solid #ddd; padding: 8px">jane.smith@example.com</td>
        <td style="border: 1px solid #ddd; padding: 8px">987-654-3210</td>
        <td style="border: 1px solid #ddd; padding: 8px">
          <a href="/customers/edit/2"><button style="padding: 5px 10px; margin-right: 5px">Edit</button></a>
          <form action="/customers/delete/2" method="post" style="display: inline;">
            <button
              type="submit"
              style="padding: 5px 10px; background-color: red; color: white"
            >
              Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

{% endblock %}
