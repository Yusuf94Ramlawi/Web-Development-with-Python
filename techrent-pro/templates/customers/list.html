{% extends "base.html" %} {% block title %}Customers{% endblock %} {% block
content %}
<div>
  <h1>Customers</h1>
  <a href="/customers/add">
    <button
      style="
        margin-bottom: 20px;
        padding: 10px 20px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      "
    >
      + Register Customer
    </button>
  </a>
</div>

<div style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px">
  <input
    type="text"
    placeholder="Search"
    style="
      padding: 8px;
      width: 200px;
      border: 1px solid #ddd;
      border-radius: 4px;
    "
  />
  <button
    style="
      padding: 8px 16px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    "
  >
    Search
  </button>
</div>

<div>
  <table>
    <thead>
      <tr>
        <th style="border: 1px solid #ddd; padding: 8px">ID</th>
        <th style="border: 1px solid #ddd; padding: 8px">Name</th>
        <th style="border: 1px solid #ddd; padding: 8px">Email</th>
        <th style="border: 1px solid #ddd; padding: 8px">Phone</th>
        <th style="border: 1px solid #ddd; padding: 8px">Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for customer in customers %}
      <tr>
        <td style="border: 1px solid #ddd; padding: 8px">{{ customer.id }}</td>
        <td style="border: 1px solid #ddd; padding: 8px">
          {{ customer.name }}
        </td>
        <td style="border: 1px solid #ddd; padding: 8px">
          {{ customer.email }}
        </td>
        <td style="border: 1px solid #ddd; padding: 8px">
          {{ customer.phone }}
        </td>
        <td style="border: 1px solid #ddd; padding: 8px">
          <a href="/customers/{{ customer.id }}/edit">
            <button
              style="
                padding: 6px 12px;
                background-color: #ffc107;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
              "
            >
              Edit
            </button>
          </a>
          <form
            action="/customers/{{ customer.id }}/delete"
            method="post"
            style="display: inline"
          >
            <button
              type="submit"
              style="
                padding: 6px 12px;
                background-color: #dc3545;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
              "
            >
              Delete
            </button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
