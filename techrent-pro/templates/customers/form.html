{% extends 'base.html' %}
{% block title %}Add customers{% endblock %}
{% block content %}
<h1>Add New customers</h1>
<div class="card p-4 mb-4 shadow-sm border-0">
    <form method="post" action="">
        <div class="mb-3">
            <label for="name" class="form-label">Full Name:</label>
            <input type="text" id="name" name="name" class="form-control" required
                value="{{ form_data.name|default('') }}">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email:</label>
            <input type="email" id="email" name="email" class="form-control" required
                value="{{ form_data.email|default('') }}">
        </div>
        <div class="mb-3">
            <label for="phone" class="form-label">Phone:</label>
            <input type="text" id="phone" name="phone" class="form-control" required
                value="{{ form_data.phone|default('') }}">
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">{{ 'Save Changes' if id else 'Register Customer' }}</button>
            <a href="/customers" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
