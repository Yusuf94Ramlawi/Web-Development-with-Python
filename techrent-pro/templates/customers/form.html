{% extends 'base.html' %}
{% block title %}Add customers{% endblock %}
{% block content %}
<h1>Add New customers</h1>
<form method="post" action="/customers/add">
    <div style="margin-bottom: 15px">
        <label for="name" style="display: block; margin-bottom: 5px">Name:</label>
        <input
        type="text"
        id="name"
        name="name"
        required
        style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px"
        />
    </div>
    <div style="margin-bottom: 15px">
        <label for="email" style="display: block; margin-bottom: 5px">Email:</label>
        <input
        type="email"
        id="email"
        name="email"
        required
        style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px"
        />
    </div>
    <div style="margin-bottom: 15px">
        <label for="phone" style="display: block; margin-bottom: 5px">Phone:</label>
        <input
        type="text"
        id="phone"
        name="phone"
        required
        style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px"
        />
    </div>
    <button
        type="submit"
        style="
        padding: 10px 20px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        "
    >
        Add customer
    </button>
</form>
{% endblock %}
